<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Glow Circle -->
  <circle cx="50" cy="50" r="48" stroke="#bef264" stroke-width="0.5" stroke-opacity="0.2" />
  
  <!-- The Sphere Base -->
  <circle cx="50" cy="50" r="40" fill="url(#sphereGradient)" />
  
  <!-- Cyberpunk Tech Lines -->
  <path d="M50 10V90M10 50H90" stroke="#bef264" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2 2" />
  
  <!-- Inner Core Glow -->
  <circle cx="50" cy="50" r="15" fill="#bef264" filter="url(#glow)" fill-opacity="0.8" />
  
  <!-- Orbital Rings -->
  <ellipse cx="50" cy="50" rx="35" ry="12" stroke="#bef264" stroke-width="2" stroke-opacity="0.6" transform="rotate(45 50 50)" />
  <ellipse cx="50" cy="50" rx="35" ry="12" stroke="#bef264" stroke-width="2" stroke-opacity="0.6" transform="rotate(-45 50 50)" />

  <defs>
    <radialGradient id="sphereGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(50 50) rotate(90) scale(40)">
      <stop offset="0" stop-color="#050505" />
      <stop offset="1" stop-color="#1a1a1a" />
    </radialGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>